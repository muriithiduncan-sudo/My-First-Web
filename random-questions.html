<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Life Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #999;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .question-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 10px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            line-height: 1.6;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-next {
            background-color: #667eea;
            color: white;
        }

        .btn-next:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-copy {
            background-color: #764ba2;
            color: white;
        }

        .btn-copy:hover {
            background-color: #6a3f8f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .counter {
            color: #999;
            margin-top: 20px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .question-box {
                font-size: 1.1em;
                padding: 30px 20px;
                min-height: 120px;
            }

            .button-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤔 Life Questions</h1>
        <p class="subtitle">Explore thought-provoking questions about life</p>
        
        <div class="question-box" id="questionBox">
            What is the first question?
        </div>

        <div class="button-container">
            <button class="btn-next" onclick="nextQuestion()">Next Question</button>
            <button class="btn-copy" onclick="copyQuestion()">Copy</button>
        </div>

        <div class="counter">
            Question <span id="questionNumber">1</span> of <span id="totalQuestions">0</span>
        </div>
    </div>

    <script>
        const questions = [
            "What does it mean to live a meaningful life?",
            "How do you define success?",
            "What are you most grateful for in your life?",
            "What is your biggest fear and how does it influence you?",
            "If you could change one thing about yourself, what would it be?",
            "What brings you the most joy?",
            "How do you want to be remembered?",
            "What is the most important lesson life has taught you?",
            "What would you do if you weren't afraid?",
            "How do you handle failure and setbacks?",
            "What does friendship mean to you?",
            "What is your purpose in life?",
            "How do you define happiness?",
            "What are your core values?",
            "What is something you've always wanted to learn?",
            "How do you balance work and personal life?",
            "What makes you feel truly alive?",
            "Who has had the biggest impact on your life?",
            "What would you regret not doing in your lifetime?",
            "How do you contribute to the world around you?",
            "What does love mean to you?",
            "How do you overcome self-doubt?",
            "What is your definition of a good person?",
            "What are your short-term and long-term goals?",
            "How do you stay motivated when things get tough?",
            "What is the most important relationship in your life?",
            "How do you handle change and uncertainty?",
            "What makes you unique?",
            "What do you wish you had known earlier in life?",
            "How do you want to spend your time on Earth?"
        ];

        let currentIndex = 0;

        function loadQuestion() {
            const questionBox = document.getElementById('questionBox');
            questionBox.textContent = questions[currentIndex];
            document.getElementById('questionNumber').textContent = currentIndex + 1;
            document.getElementById('totalQuestions').textContent = questions.length;
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % questions.length;
            loadQuestion();
        }

        function copyQuestion() {
            const question = questions[currentIndex];
            navigator.clipboard.writeText(question).then(() => {
                alert('Question copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Initialize on page load
        loadQuestion();
    </script>
</body>
</html>
